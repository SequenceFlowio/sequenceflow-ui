<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">Laat je inbox niet je dag bepalen</title>
  <desc id="desc">SequenceFlow advertentie voor e-commerce founders.</desc>
  <rect width="1080" height="1350" fill="#F7F7F2"/>
  <circle cx="972" cy="110" r="260" fill="#C7F56F" opacity=".45"/>
  <text x="74" y="92" fill="#111711" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="800">SequenceFlow</text>
  <rect x="74" y="142" width="208" height="42" rx="21" fill="#111711"/>
  <text x="98" y="171" fill="#C7F56F" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700">VOOR FOUNDERS</text>
  <text x="74" y="300" fill="#111711" font-family="Inter,Arial,sans-serif" font-size="78" font-weight="800" letter-spacing="-3">
    <tspan x="74" dy="0">Laat je inbox niet</tspan>
    <tspan x="74" dy="88">je dag bepalen.</tspan>
  </text>
  <text x="78" y="514" fill="#667064" font-family="Inter,Arial,sans-serif" font-size="31">
