    <tspan x="78" dy="46">en productvragen. Vanuit jouw beleid.</tspan>
  </text>
  <rect x="74" y="638" width="932" height="470" rx="32" fill="#111711"/>
  <text x="118" y="700" fill="#8D978D" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="700">INKOMENDE KLANTMAIL</text>
  <text x="118" y="752" fill="#FFFFFF" font-family="Inter,Arial,sans-serif" font-size="29" font-weight="700">Waar blijft bestelling #4821?</text>
  <rect x="118" y="790" width="178" height="42" rx="12" fill="#243349"/>
  <text x="140" y="819" fill="#60A5FA" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="700">bestelstatus</text>
  <rect x="310" y="790" width="92" height="42" rx="12" fill="#26351E"/>
  <text x="335" y="819" fill="#C7F56F" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="700">91%</text>
  <line x1="118" y1="870" x2="962" y2="870" stroke="#394139"/>
  <text x="118" y="918" fill="#8D978D" font-family="Inter,Arial,sans-serif" font-size="19" font-weight="700">AI-CONCEPT</text>
  <text x="118" y="970" fill="#E7EAE5" font-family="Inter,Arial,sans-serif" font-size="25">
