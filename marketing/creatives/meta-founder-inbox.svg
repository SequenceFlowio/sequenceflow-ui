    <tspan x="118" dy="38">onderweg en wordt volgens ons verzendbeleid...</tspan>
  </text>
  <rect x="730" y="1032" width="232" height="52" rx="16" fill="#C7F56F"/>
  <text x="773" y="1067" fill="#111711" font-family="Inter,Arial,sans-serif" font-size="21" font-weight="800">CONCEPT KLAAR</text>
  <rect x="74" y="1174" width="426" height="82" rx="20" fill="#C7F56F"/>
  <text x="116" y="1226" fill="#111711" font-family="Inter,Arial,sans-serif" font-size="27" font-weight="800">START 14 DAGEN GRATIS</text>
